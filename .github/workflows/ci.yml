name: VoteScale CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    # We need to give the token permission to write to packages
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Backend
      run: |
        cd backend
        # Tag the image with your github repository name
        docker build -t ghcr.io/${{ github.repository_owner }}/votescale-backend:latest .
        docker push ghcr.io/${{ github.repository_owner }}/votescale-backend:latest

    - name: Build and Push Frontend
      run: |
        cd frontend
        docker build -t ghcr.io/${{ github.repository_owner }}/votescale-frontend:latest .
        docker push ghcr.io/${{ github.repository_owner }}/votescale-frontend:latest